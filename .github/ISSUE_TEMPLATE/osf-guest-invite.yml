name: Open Source Friday Guest Request
description: Complete this form to request to be a guest on Open Source Friday
title: Open Source Friday - [PROJECT NAME] - [MM-DD-YYYY]
labels: ["open-source-friday", "open-source", "twitch", "pending"]
assignees:
  - AndreaGriffiths11
  - KevinCrosby
  - marlenezw
  - madebygps

body:
  - type: markdown
    attributes:
      value: |
        ## Open Source Friday Guest Invite Form
        #### :sparkles: Please fill out the following information to be invited to Open Source Friday. The stream occurs weekly at 1pm EST on the [GitHub Twitch Channel](https://www.twitch.tv/github). :sparkles:

        **You don't need a stream date to submit.** We review every request, and once your project is approved we'll apply the `approved` label and a bot will comment on this issue with a calendar link so you can book your slot. If you already have a date in mind, add it below — otherwise just check "Not yet" and we'll take it from there.

  - type: input
    id: name
    attributes:
      label: Name
      description: Your name
      placeholder: "Andrea Griffiths"

  - type: input
    id: github_handle
    attributes:
      label: GitHub Handle
      description: Your GitHub handle
      placeholder: "@AndreaGriffiths11"

  - type: textarea
    id: about_you
    attributes:
      label: Tell us about yourself
      description: Please share a bit about yourself and your background
      placeholder: "I'm a developer who..."

  - type: input
    id: project_name_1
    attributes:
      label: Project Name
      description: The name of the project you'd like to showcase and chat about
      placeholder: "Awesome Project"

  - type: input
    id: project_repo_1
    attributes:
      label: Project Repo Link
      description: The github repository of your project
      placeholder: "github.com/repo-url"

  - type: checkboxes
    id: stream_date
    attributes:
      label: Stream Date
      description: "Already picked a date from https://gh.io/osf-booking? Let us know. If not, choose \"Not yet\" — we'll send you the booking link once your request is approved."
      options:
        - label: "Yes"
        - label: "Not yet"

  - type: input
    id: dates_1
    attributes:
      label: Dates
      description: "Optional — only fill this in if you've already booked a slot. Format: MM-DD-YYYY."
      placeholder: MM-DD-YYYY

  - type: input
    id: social_twitter
    attributes:
      label: Twitter URL
      description: Your Twitter profile
      placeholder: "@alacolombiadev"

  - type: input
    id: social_linkedin
    attributes:
      label: LinkedIn URL
      description: Your LinkedIn profile
      placeholder: "linkedin.com/in/your-profile"

  - type: textarea
    id: more_info
    attributes:
      label: Additional Information
      description: Please share any additional details you'd like us to know about your project
      placeholder: "I'd like to talk about..."
